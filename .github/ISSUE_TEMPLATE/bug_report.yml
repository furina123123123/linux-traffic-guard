name: Bug report
description: Report a reproducible problem in Linux Traffic Guard.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please remove secrets, public IPs you do not want to disclose, and private log content.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ltg --version` or the commit SHA.
      placeholder: Linux 流量守卫 4.10.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Ubuntu version
      placeholder: Ubuntu 22.04 / 24.04
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command or TUI path you used.
      placeholder: |
        1. sudo ./ltg
        2. Open Security Center -> ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant output from `sudo ltg --doctor`, `sudo ltg --status`, or exported reports.
      render: text
