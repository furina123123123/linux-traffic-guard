name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the CLI/TUI flow you expect.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Traffic accounting
        - UFW analysis
        - fail2ban policy management
        - TUI interaction
        - Build/release
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or examples
      description: Include distro details, existing tools, logs, or screenshots if helpful.
